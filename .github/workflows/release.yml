name: Release

permissions:
  contents: write

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate version against tag
        if: github.event_name == 'release'
        run: |
          VERSION="$(cat VERSION)"
          TAG="${GITHUB_REF_NAME#v}"
          test "$VERSION" = "$TAG"
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev python3-pyqt6 postgresql-client rsync
      - name: Build deb
        run: bash dist/build_deb.sh
      - name: Upload deb to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${GITHUB_REF_NAME}" dist/odoo-restore_$(cat VERSION)_all.deb --clobber

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate version against tag
        if: github.event_name == 'release'
        run: |
          VERSION="$(cat VERSION)"
          TAG="${GITHUB_REF_NAME#v}"
          test "$VERSION" = "$TAG"
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller
      - name: Build macOS app
        run: python dist/build_app.py
      - name: Upload macOS zip to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${GITHUB_REF_NAME}" dist/OdooRestore-macOS-$(cat VERSION).zip --clobber
